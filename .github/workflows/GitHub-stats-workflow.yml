name: Update GitHub Stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=GeovanaSLima&show_icons=true&include_all_commits=true&count_private=true&hide_rank=false&bg_color=262626&title_color=ffffff&text_color=bcbcbc&icon_color=ffffaf"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit e push do SVG
        run: |
          git config user.name "GeovanaSLima"
          git config user.email "geovanasslima@gmail.com"
          mkdir -p profile
          git add profile/stats.svg
          git diff --cached --quiet || git commit -m "chore: atualiza github stats card"
          git push
